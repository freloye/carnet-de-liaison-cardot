<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f4f6f8">
  <title>Carnet de liaison Cardot</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="app">
    <header class="entete">
      <p class="version" id="versionApp">V0.9 TEST</p>
      <h1>Carnet de liaison</h1>
      <p class="date" id="dateJournee"></p>
    </header>

    <form id="formulaireJournee">
      <section class="carte">
        <h2>Activités réalisées</h2>
        <p class="aide">Touchez les activités faites aujourd’hui.</p>

        <div class="grille-choix">
          <button type="button" class="choix multiple" data-groupe="activites" data-valeur="repas">
            Repas cuisiné
          </button>
          <button type="button" class="choix multiple" data-groupe="activites" data-valeur="courses">
            Courses
          </button>
          <button type="button" class="choix multiple" data-groupe="activites" data-valeur="menage">
            Ménage
          </button>
          <button type="button" class="choix multiple" data-groupe="activites" data-valeur="exterieur">
            Entretien extérieur
          </button>
          <button type="button" class="choix multiple largeur-complete" data-groupe="activites" data-valeur="autre">
            Autre activité
          </button>
          <button type="button" class="choix multiple largeur-complete neutre" data-groupe="activites" data-valeur="aucune">
            Aucune activité aujourd’hui
          </button>
        </div>
      </section>

      <section class="carte">
        <h2>Thérèse</h2>

        <fieldset>
          <legend>Moral</legend>
          <div class="grille-choix trois">
            <button type="button" class="choix unique" data-groupe="moralTherese" data-valeur="moins_bien">
              Moins bien
            </button>
            <button type="button" class="choix unique" data-groupe="moralTherese" data-valeur="comme_habitude">
              Comme d’habitude
            </button>
            <button type="button" class="choix unique" data-groupe="moralTherese" data-valeur="mieux">
              Mieux
            </button>
          </div>
        </fieldset>

        <fieldset>
          <legend>État de santé général</legend>
          <div class="grille-choix trois">
            <button type="button" class="choix unique" data-groupe="santeTherese" data-valeur="moins_bien">
              Moins bien
            </button>
            <button type="button" class="choix unique" data-groupe="santeTherese" data-valeur="comme_habitude">
              Comme d’habitude
            </button>
            <button type="button" class="choix unique" data-groupe="santeTherese" data-valeur="mieux">
              Mieux
            </button>
          </div>
        </fieldset>

        <fieldset>
          <legend>Mobilité avec le déambulateur</legend>
          <div class="grille-choix trois">
            <button type="button" class="choix unique" data-groupe="mobiliteTherese" data-valeur="moins_bien">
              Moins bien
            </button>
            <button type="button" class="choix unique" data-groupe="mobiliteTherese" data-valeur="comme_habitude">
              Comme d’habitude
            </button>
            <button type="button" class="choix unique" data-groupe="mobiliteTherese" data-valeur="mieux">
              Mieux
            </button>
          </div>
        </fieldset>
      </section>

      <section class="carte">
        <h2>Pierre-Yves</h2>

      <label class="libelle-range">
  Mon énergie aujourd’hui
  <strong><span id="valeurEnergie">5</span> / 10</strong>
</label>

<div class="bargraph" id="energiePY" data-value="5">

  <button type="button" data-value="0">0</button>
  <button type="button" data-value="1">1</button>
  <button type="button" data-value="2">2</button>
  <button type="button" data-value="3">3</button>
  <button type="button" data-value="4">4</button>
  <button type="button" data-value="5" class="active">5</button>
  <button type="button" data-value="6">6</button>
  <button type="button" data-value="7">7</button>
  <button type="button" data-value="8">8</button>
  <button type="button" data-value="9">9</button>
  <button type="button" data-value="10">10</button>

</div>

        <label class="libelle-range" for="moralPY">
          Mon moral aujourd’hui
          <strong><span id="valeurMoral">5</span> / 10</strong>
        </label>
        <input type="range" id="moralPY" name="moralPY" min="0" max="10" value="5">

        <fieldset>
          <legend>Ma journée s’est passée</legend>
          <div class="grille-choix trois">
            <button type="button" class="choix unique" data-groupe="journeePY" data-valeur="difficile">
              Difficilement
            </button>
            <button type="button" class="choix unique" data-groupe="journeePY" data-valeur="normalement">
              Normalement
            </button>
            <button type="button" class="choix unique" data-groupe="journeePY" data-valeur="bien">
              Bien
            </button>
          </div>
        </fieldset>
      </section>

      <section class="carte">
        <label for="remarque">
          <h2>Une remarque ?</h2>
        </label>
        <textarea id="remarque" name="remarque" rows="3" maxlength="500"
          placeholder="Facultatif"></textarea>
      </section>

      <div class="zone-validation">
        <button type="submit" id="boutonValider" class="bouton-principal">
          Valider la journée
        </button>
        <p id="messageEtat" class="message-etat" aria-live="polite"></p>
      </div>
    </form>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
